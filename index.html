<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Tour panorámico interactivo</title>

    <link rel="stylesheet" href="vendor/pannellum.css"/>
    <script src="vendor/pannellum.js"></script>

    <style>
        :root {
            /* =====================================================
               AJUSTES GENERALES DE LOS PUNTOS
               ===================================================== */

            --hotspot-size: 12px;
            --hotspot-color-rgb: 0, 210, 255;
            --hotspot-alpha: 0.50;

            --hotspot-border-size: 1.3px;
            --hotspot-border-rgb: 255, 255, 255;
            --hotspot-border-alpha: 0.70;

            --hotspot-glow-size: 10px;
            --hotspot-glow-alpha: 0.80;

            --hotspot-inner-glow-alpha: 0.55;

            --hotspot-hover-scale: 1.45;

            /* =====================================================
               AJUSTES PARA MÓVILES / PANTALLAS TÁCTILES
               ===================================================== */

            --hotspot-mobile-size: 28px;
            --hotspot-mobile-alpha: 0.78;

            --hotspot-mobile-border-size: 2.5px;
            --hotspot-mobile-border-alpha: 0.95;

            --hotspot-mobile-glow-size: 22px;
            --hotspot-mobile-glow-alpha: 1.0;

            --hotspot-mobile-hover-scale: 1.25;

            /* Cartel flotante */
            --label-background-alpha: 0.80;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: Arial, sans-serif;
        }

        #panorama {
            width: 100vw;
            height: 100vh;
        }

        #info {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.58);
            color: white;
            padding: 9px 13px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.35;
            max-width: 360px;
        }

        #coords {
            position: absolute;
            right: 12px;
            top: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.58);
            color: white;
            padding: 9px 13px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.35;
            max-width: 260px;
        }

        .custom-hotspot {
            width: var(--hotspot-size);
            height: var(--hotspot-size);
            border-radius: 50%;
            background: rgba(var(--hotspot-color-rgb), var(--hotspot-alpha));
            border: var(--hotspot-border-size) solid rgba(var(--hotspot-border-rgb), var(--hotspot-border-alpha));
            box-shadow:
                0 0 var(--hotspot-glow-size) rgba(var(--hotspot-color-rgb), var(--hotspot-glow-alpha)),
                inset 0 0 5px rgba(255,255,255,var(--hotspot-inner-glow-alpha));
            cursor: pointer;
            opacity: 0.92;
            transition: transform 0.15s ease, opacity 0.15s ease;
            animation: hotspotPulse 2.2s infinite ease-in-out;
        }

        .custom-hotspot:hover {
            transform: scale(var(--hotspot-hover-scale));
            opacity: 1.0;
        }

        .hotspot-label {
            display: none;
            position: absolute;
            left: 20px;
            top: -9px;
            min-width: 170px;
            background: rgba(0,0,0,var(--label-background-alpha));
            color: white;
            padding: 7px 9px;
            border-radius: 7px;
            font-size: 12px;
            line-height: 1.25;
            pointer-events: none;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
        }

        .custom-hotspot:hover .hotspot-label {
            display: block;
        }

        @keyframes hotspotPulse {
            0% {
                box-shadow:
                    0 0 6px rgba(var(--hotspot-color-rgb), 0.52),
                    inset 0 0 5px rgba(255,255,255,var(--hotspot-inner-glow-alpha));
            }
            50% {
                box-shadow:
                    0 0 14.5px rgba(var(--hotspot-color-rgb), var(--hotspot-glow-alpha)),
                    inset 0 0 6px rgba(255,255,255,var(--hotspot-inner-glow-alpha));
            }
            100% {
                box-shadow:
                    0 0 6px rgba(var(--hotspot-color-rgb), 0.52),
                    inset 0 0 5px rgba(255,255,255,var(--hotspot-inner-glow-alpha));
            }
        }

        @media (max-width: 900px), (pointer: coarse) {
            .custom-hotspot {
                width: var(--hotspot-mobile-size) !important;
                height: var(--hotspot-mobile-size) !important;
                background: rgba(var(--hotspot-color-rgb), var(--hotspot-mobile-alpha)) !important;
                border: var(--hotspot-mobile-border-size) solid rgba(var(--hotspot-border-rgb), var(--hotspot-mobile-border-alpha)) !important;
                opacity: 1 !important;
                box-shadow:
                    0 0 var(--hotspot-mobile-glow-size) rgba(var(--hotspot-color-rgb), var(--hotspot-mobile-glow-alpha)),
                    inset 0 0 8px rgba(255,255,255,0.75) !important;
                animation: hotspotPulseMobile 2.2s infinite ease-in-out !important;
            }

            .custom-hotspot:hover {
                transform: scale(var(--hotspot-mobile-hover-scale)) !important;
            }

            .hotspot-label {
                left: 36px !important;
                top: -10px !important;
                font-size: 14px !important;
                min-width: 190px !important;
                padding: 9px 11px !important;
            }

            #info {
                font-size: 11px;
                padding: 7px 9px;
                max-width: 72vw;
            }

            #coords {
                display: none;
            }

            @keyframes hotspotPulseMobile {
                0% {
                    box-shadow:
                        0 0 14px rgba(var(--hotspot-color-rgb), 0.75),
                        inset 0 0 7px rgba(255,255,255,0.70);
                }
                50% {
                    box-shadow:
                        0 0 26px rgba(var(--hotspot-color-rgb), 1.0),
                        inset 0 0 8px rgba(255,255,255,0.80);
                }
                100% {
                    box-shadow:
                        0 0 14px rgba(var(--hotspot-color-rgb), 0.75),
                        inset 0 0 7px rgba(255,255,255,0.70);
                }
            }
        }

        #modalOverlay {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.78);
            align-items: center;
            justify-content: center;
        }

        #modalBox {
            width: min(900px, 92vw);
            max-height: 90vh;
            overflow: auto;
            background: white;
            color: #222;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }

        #modalHeader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        #modalTitle {
            margin: 0;
            font-size: 22px;
        }

        #modalClose {
            border: none;
            background: #222;
            color: white;
            border-radius: 8px;
            padding: 7px 11px;
            cursor: pointer;
            font-size: 18px;
        }

        #modalDescription {
            margin-top: 12px;
            font-size: 15px;
            line-height: 1.45;
        }

        #modalImage {
            display: none;
            width: 100%;
            max-height: 60vh;
            object-fit: contain;
            margin-top: 14px;
            border-radius: 10px;
            background: #eee;
        }

        #modalLink {
            display: none;
            margin-top: 14px;
            padding: 9px 12px;
            background: #1846c8;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            width: fit-content;
        }
    </style>
</head>

        const PANORAMA_VERSIONS = [
            {
                "name": "panorama_4096.jpg",
                "width": 4096,
                "height": 760,
                "original": false
            },
            {
                "name": "panorama_8192.jpg",
                "width": 8192,
                "height": 1519,
                "original": false
            },
            {
                "name": "panorama_12000.jpg",
                "width": 12000,
                "height": 2226,
                "original": false
            },
            {
                "name": "panorama_24769.jpg",
                "width": 24769,
                "height": 4594,
                "original": true
            }
        ];

        function getMaxTextureSize() {
            try {
                const canvas = document.createElement("canvas");
                const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

                if (!gl) {
                    return 4096;
                }

                return gl.getParameter(gl.MAX_TEXTURE_SIZE);
            } catch (e) {
                return 4096;
            }
        }

        function chooseBestPanorama() {
            const maxTexture = getMaxTextureSize();

            let candidates = PANORAMA_VERSIONS.filter(p => {
                return p.width <= maxTexture && p.height <= maxTexture;
            });

            candidates.sort((a, b) => a.width - b.width);

            if (candidates.length === 0) {
                const fallback = PANORAMA_VERSIONS[0];
                return {
                    panorama: fallback,
                    maxTexture: maxTexture,
                    reason: "fallback"
                };
            }

            if (PREFERIR_MAXIMA_CALIDAD_COMPATIBLE) {
                const chosen = candidates[candidates.length - 1];
                return {
                    panorama: chosen,
                    maxTexture: maxTexture,
                    reason: "maxima_calidad_compatible"
                };
            }

            const viewportW = window.innerWidth * (window.devicePixelRatio || 1);
            const desiredWidth = Math.max(4096, viewportW * 2.5);

            let chosen = candidates[0];

            for (const c of candidates) {
                if (c.width <= desiredWidth) {
                    chosen = c;
                }
            }

            return {
                panorama: chosen,
                maxTexture: maxTexture,
                reason: "adaptada_a_pantalla"
            };
        }

        const selected = chooseBestPanorama();
        const selectedPanorama = selected.panorama.name;

        document.getElementById("selectedPanorama").textContent =
            selectedPanorama +
            " | límite WebGL: " + selected.maxTexture + " px";

        console.log("Versiones disponibles:", PANORAMA_VERSIONS);
        console.log("Panorama elegido:", selected);

        function openModal(args) {
            document.getElementById("modalTitle").textContent = args.title || "Objeto";
            document.getElementById("modalDescription").textContent = args.description || "";

            const img = document.getElementById("modalImage");
            if (args.image) {
                img.src = args.image;
                img.style.display = "block";
            } else {
                img.src = "";
                img.style.display = "none";
            }

            const link = document.getElementById("modalLink");
            if (args.url) {
                link.href = args.url;
                link.textContent = "Abrir enlace";
                link.style.display = "inline-block";
            } else if (args.image) {
                link.href = args.image;
                link.textContent = "Abrir imagen en pestaña nueva";
                link.style.display = "inline-block";
            } else {
                link.href = "";
                link.style.display = "none";
            }

            document.getElementById("modalOverlay").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modalOverlay").style.display = "none";
        }

        document.getElementById("modalClose").addEventListener("click", closeModal);

        document.getElementById("modalOverlay").addEventListener("click", function(e) {
            if (e.target.id === "modalOverlay") {
                closeModal();
            }
        });

        function createHotspot(hotSpotDiv, args) {
            hotSpotDiv.classList.add("custom-hotspot");

            const label = document.createElement("div");
            label.className = "hotspot-label";
            label.innerHTML = "<strong>" + args.title + "</strong><br>Click para ver detalle";
            hotSpotDiv.appendChild(label);

            hotSpotDiv.addEventListener("click", function(e) {
                e.stopPropagation();
                openModal(args);
            });
        }

        function buildHotspots() {
            return HOTSPOTS.map(h => ({
                pitch: Number(h.pitch),
                yaw: Number(h.yaw),
                cssClass: "custom-hotspot",
                createTooltipFunc: createHotspot,
                createTooltipArgs: h
            }));
        }

        const viewer = pannellum.viewer('panorama', {
            type: 'equirectangular',
            panorama: selectedPanorama,
            autoLoad: true,
            compass: true,
            showZoomCtrl: true,
            mouseZoom: true,
            hfov: 100,

            haov: 360,
            vaov: 80,
            vOffset: 0,

            hotSpots: buildHotspots()
        });

        if (EDIT_MODE) {
            document.getElementById("panorama").addEventListener("click", function(event) {
                if (event.target.closest(".custom-hotspot")) {
                    return;
                }

                const coords = viewer.mouseEventToCoords(event);
                const pitch = coords[0].toFixed(2);
                const yaw = coords[1].toFixed(2);

                document.getElementById("coords").innerHTML =
                    "Coordenadas:<br>" +
                    "pitch: " + pitch + "<br>" +
                    "yaw: " + yaw + "<br><br>" +
                    "Copia estos valores en HOTSPOTS";

                console.log({
                    pitch: Number(pitch),
                    yaw: Number(yaw)
                });
            });
        }
